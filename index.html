<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Pharmacy Analytics Dashboard</title>

    <!-- FusionCharts -->
    <script src="https://cdn.fusioncharts.com/fusioncharts/latest/fusioncharts.js"></script>
    <script src="https://cdn.fusioncharts.com/fusioncharts/latest/themes/fusioncharts.theme.fusion.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Pharmacy Data Analytics Dashboard</h1>

    <div class="grid">

        <div class="card">
            <h3>Category Distribution</h3>
            <div id="categoryChart"></div>
        </div>

        <div class="card">
            <h3>Average Rating by City</h3>
            <div id="cityRatingChart"></div>
        </div>

        <div class="card">
            <h3>Rating Distribution</h3>
            <div id="ratingChart"></div>
        </div>

        <div class="card">
            <h3>Total Reviews by City</h3>
            <div id="cityReviewsChart"></div>
        </div>

        <div class="card full">
            <h3>Average Daily Footfall (Hourly)</h3>
            <div id="timeChart"></div>
        </div>

        <div class="card full">
            <h3>Service Availability</h3>
            <div id="serviceChart"></div>
        </div>

    </div>

    <script src="indian_pharmacy.js"></script>
    <script src="script.js"></script>
</body>

</html>
